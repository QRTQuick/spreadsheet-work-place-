<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | {{ app_name }}</title>
    <meta name="description" content="{{ description }}">
    <meta name="keywords" content="online spreadsheet, spreadsheet workspace, flask spreadsheet app, neon postgres spreadsheet, premium spreadsheet ui">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#1a73e8">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ title }} | {{ app_name }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta property="og:image" content="{{ site_url }}{{ asset_url('img/og-cover.svg') }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} | {{ app_name }}">
    <meta name="twitter:description" content="{{ description }}">
    <meta name="twitter:image" content="{{ site_url }}{{ asset_url('img/og-cover.svg') }}">
    <link rel="icon" href="{{ asset_url('img/logo-mark.svg') }}" type="image/svg+xml">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <link rel="stylesheet" href="{{ asset_url('css/site.css') }}">
    {% if structured_data %}
    <script type="application/ld+json">{{ structured_data|safe }}</script>
    {% endif %}
    {% block extra_head %}{% endblock %}
</head>
<body class="{{ body_class|default('') }}">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    {% block body %}{% endblock %}
    <script src="{{ asset_url('js/site.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
